<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ノーショウ顧客管理</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 { text-align: center; color: #c0392b; margin-bottom: 30px; }
    h2 { margin-top: 0; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      background: #bdc3c7;
      cursor: pointer;
      font-size: 14px;
    }
    .tab-btn.active { background: #c0392b; color: white; }
    .card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: none;
    }
    .card.active { display: block; }
    .upload-area {
      border: 2px dashed #c0392b;
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      margin-bottom: 16px;
      background: #fdf2f2;
    }
    button.primary {
      background: #c0392b;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }
    button.primary:hover { background: #a93226; }
    .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-box input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }
    .search-box input { flex: 1; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th { background: #c0392b; color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    tr:hover td { background: #fdf2f2; }
    .badge {
      background: #e74c3c;
      color: white;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 13px;
    }
    #message { padding: 12px; border-radius: 6px; margin-top: 12px; display: none; }
    #message.success { background: #d5f5e3; color: #1e8449; }
    #message.error   { background: #fadbd8; color: #c0392b; }
    /* リピートテーブル */
    .repeat-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
    .repeat-table th {
      background: #c0392b; color: white; padding: 8px 10px;
      text-align: center; white-space: nowrap; position: sticky; top: 0;
    }
    .repeat-table th:first-child { text-align: left; }
    .repeat-table td { padding: 8px 10px; border-bottom: 1px solid #eee; text-align: center; }
    .repeat-table td:first-child { text-align: left; font-weight: bold; }
    .repeat-table td:nth-child(2) { font-weight: bold; color: #c0392b; }
    .repeat-table tr:hover td { background: #fdf2f2; }
    .cnt-cell { background: #fff3f3; border-radius: 4px; }
    .repeat-wrap { overflow-x: auto; max-height: 600px; overflow-y: auto; }
    input[type="checkbox"].bill-check { width: 16px; height: 16px; cursor: pointer; accent-color: #c0392b; }
    .month-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }

    /* サマリテーブル */
    .summary-table th { background: #c0392b; color: white; padding: 10px; text-align: right; }
    .summary-table th:first-child { text-align: left; }
    .summary-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; }
    .summary-table td:first-child { text-align: left; font-weight: bold; }
    .up   { color: #e74c3c; }   /* 前月より増加 */
    .down { color: #27ae60; }   /* 前月より減少 */
    .same { color: #888; }
    .summary-cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .s-card {
      background: #fdf2f2;
      border-left: 4px solid #c0392b;
      border-radius: 6px;
      padding: 14px 20px;
      min-width: 140px;
    }
    .s-card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .s-card .value { font-size: 24px; font-weight: bold; color: #c0392b; }
    .s-card .diff  { font-size: 13px; margin-top: 4px; }

    /* 日次チェックテーブル */
    .daily-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .daily-table th { background: #c0392b; color: white; padding: 10px; text-align: left; }
    .daily-table td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
    .daily-table tr:hover td { background: #fdf2f2; }
    .warn-icon { color: #e67e22; font-size: 16px; margin-left: 6px; }
    .checked-row td { background: #eafaf1 !important; color: #888; text-decoration: line-through; }
  </style>
</head>
<body>

  <h1>🚫 ノーショウ顧客管理</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('upload', this)">📤 CSVアップロード</button>
    <button class="tab-btn" onclick="showTab('daily', this)">⚠️ 注意喚起（毎日）</button>
    <button class="tab-btn" onclick="showTab('summary', this)">📊 月別サマリ</button>
    <button class="tab-btn" onclick="showTab('repeat', this)">⚠️ 2回以上ノーショウ</button>
    <button class="tab-btn" onclick="showTab('monthly', this)">� 月別集計</button>
    <button class="tab-btn" onclick="showTab('all', this)">� 全件集計</buttonu>
    <button class="tab-btn" onclick="showTab('search', this)">🔍 会員ID検索</button>
  </div>

  <!-- ===== タブ1: CSVアップロード ===== -->
  <div id="tab-upload" class="card active">
    <h2>CSVファイルをアップロード</h2>
    <p class="hint">
      CSVフォーマット（ヘッダー行不要）:<br>
      　会員IDのみ　→ <code>A001</code><br>
      　日付あり　　→ <code>A001,2026-03-05</code>
    </p>
    <div class="upload-area">
      <div style="font-size:40px">📁</div>
      <p>CSVファイルを選択してください</p>
      <input type="file" id="csvFile" accept=".csv,.txt">
    </div>
    <button class="primary" onclick="uploadCSV()">アップロードして保存</button>
    <div id="message"></div>
  </div>

  <!-- ===== タブ: 注意喚起（毎日） ===== -->
  <div id="tab-daily" class="card">
    <h2>⚠️ 注意喚起（毎日）</h2>

    <!-- 未配信日付パネル（TOP表示） -->
    <div id="unchecked-dates-box" style="background:#fdf2f2;border-left:4px solid #c0392b;border-radius:6px;padding:14px 18px;margin-bottom:18px">
      <div style="font-weight:bold;color:#c0392b;margin-bottom:8px">� 未配信の日付</div>
      <div id="unchecked-dates-list" style="font-size:13px;color:#555">読み込み中...</div>
    </div>

    <!-- 週間要注意者セクション -->
    <div id="weekly-alert-box" style="display:none;background:#fff3cd;border-left:4px solid #e67e22;border-radius:6px;padding:14px 18px;margin-bottom:18px">
      <div style="font-weight:bold;color:#e67e22;margin-bottom:8px">🚨 週間要注意者（直近7日間で2回以上）</div>
      <div id="weekly-alert-list" style="font-size:13px;color:#555"></div>
    </div>

    <!-- 日付選択 -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <label style="font-weight:bold">対象日：</label>
      <input type="date" id="dailyDate"
        style="padding:8px;border:1px solid #ccc;border-radius:6px;font-size:15px"
        onchange="loadDaily()">
    </div>

    <!-- 配信ステータスバー -->
    <div id="daily-status-bar" style="display:none;align-items:center;gap:16px;padding:14px 18px;border-radius:8px;margin-bottom:16px;flex-wrap:wrap">
      <span id="daily-status-label" style="font-size:16px;font-weight:bold"></span>
      <button id="daily-check-btn" class="primary" onclick="toggleDailyCheck()"></button>
    </div>

    <div id="daily-result"></div>
  </div>

  <!-- ===== タブ2: 月別サマリ ===== -->
  <div id="tab-summary" class="card">
    <h2>📊 月別サマリ</h2>
    <button class="primary" onclick="loadSummary()">最新データを表示</button>
    <div id="summary-result"></div>
  </div>

  <!-- ===== タブ3: 2回以上ノーショウ ===== -->
  <div id="tab-repeat" class="card">
    <h2>⚠️ 2回以上ノーショウの顧客（同月2回以上）</h2>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
      <button class="primary" onclick="loadRepeat()">最新データを表示</button>
      <button class="primary" style="background:#27ae60" onclick="saveBilling()">請求チェックを保存</button>
    </div>
    <div id="repeat-result"></div>
  </div>

  <!-- ===== タブ3: 月別集計 ===== -->
  <div id="tab-monthly" class="card">
    <h2>📅 月別ノーショウ集計</h2>
    <div class="month-selector">
      <!-- データがある月をプルダウンで選択 -->
      <select id="monthSelect">
        <option value="">-- 月を選択 --</option>
      </select>
      <button class="primary" onclick="loadMonthly()">表示</button>
    </div>
    <div id="monthly-result"></div>
  </div>

  <!-- ===== タブ4: 全件集計 ===== -->
  <div id="tab-all" class="card">
    <h2>📋 全会員のノーショウ集計</h2>
    <button class="primary" onclick="loadAll()">最新データを表示</button>
    <div id="all-result"></div>
  </div>

  <!-- ===== タブ5: 会員ID検索 ===== -->
  <div id="tab-search" class="card">
    <h2>🔍 会員ID検索</h2>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="会員IDを入力（部分一致）"
             onkeydown="if(event.key==='Enter') searchMember()">
      <button class="primary" onclick="searchMember()">検索</button>
    </div>
    <div id="search-result"></div>
  </div>

  <script>
    // ===== タブ切り替え =====
    function showTab(name, btn) {
      document.querySelectorAll('.card').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');

      // 月別タブを開いたときにプルダウンを自動更新
      if (name === 'monthly') loadMonths();
      // サマリタブを開いたとき自動ロード
      if (name === 'summary') loadSummary();
      // 注意喚起タブを開いたとき自動ロード
      if (name === 'daily') initDaily();
    }

    // ===== CSVアップロード =====
    async function uploadCSV() {
      const fileInput = document.getElementById('csvFile');
      if (!fileInput.files[0]) {
        showMessage('ファイルを選択してください', 'error');
        return;
      }
      const formData = new FormData();
      formData.append('csvfile', fileInput.files[0]);
      try {
        const res  = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await res.json();
        showMessage(data.message || data.error, res.ok ? 'success' : 'error');
        if (res.ok) fileInput.value = '';
      } catch {
        showMessage('通信エラーが発生しました', 'error');
      }
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent  = text;
      el.className    = type;
      el.style.display = 'block';
    }

    // ===== テーブル生成（回数列）=====
    function buildCountTable(data, emptyMsg) {
      if (!data.length) return `<p style="color:#888;margin-top:16px">${emptyMsg}</p>`;
      let html = `<table><tr><th>会員ID</th><th>ノーショウ回数</th></tr>`;
      for (const row of data) {
        html += `<tr><td>${row.member_id}</td><td><span class="badge">${row.count} 回</span></td></tr>`;
      }
      return html + '</table>';
    }

    // ===== テーブル生成（日付列あり・検索結果用）=====
    function buildDetailTable(data, emptyMsg) {
      if (!data.length) return `<p style="color:#888;margin-top:16px">${emptyMsg}</p>`;
      let html = `<table><tr><th>会員ID</th><th>ノーショウ日</th><th>登録日時</th></tr>`;
      for (const row of data) {
        html += `<tr>
          <td>${row.member_id}</td>
          <td>${row.noshow_date || '未登録'}</td>
          <td>${row.uploaded_at}</td>
        </tr>`;
      }
      return html + '</table>';
    }

    // ===== 月別サマリ =====
    async function loadSummary() {
      const data = await fetchJSON('/api/summary');
      const el = document.getElementById('summary-result');

      if (!data.length) {
        el.innerHTML = '<p style="color:#888;margin-top:16px">データがありません</p>';
        return;
      }

      // 最新月のカード表示
      const latest = data[data.length - 1];
      const prev   = data.length >= 2 ? data[data.length - 2] : null;

      const diffTotal  = prev ? latest.total          - prev.total          : null;
      const diffUnique = prev ? latest.unique_members - prev.unique_members : null;
      const diffRepeat = prev ? latest.repeat         - prev.repeat         : null;

      function diffLabel(d) {
        if (d === null) return '<span class="same">（前月データなし）</span>';
        if (d > 0) return `<span class="up">▲ ${d}</span>`;
        if (d < 0) return `<span class="down">▼ ${Math.abs(d)}</span>`;
        return '<span class="same">± 0</span>';
      }

      let html = `
        <p style="color:#888;font-size:13px;margin-top:12px">最新月: ${latest.month}</p>
        <div class="summary-cards">
          <div class="s-card">
            <div class="label">総ノーショウ件数</div>
            <div class="value">${latest.total.toLocaleString()}</div>
            <div class="diff">前月比 ${diffLabel(diffTotal)}</div>
          </div>
          <div class="s-card">
            <div class="label">ユニーク会員数</div>
            <div class="value">${latest.unique_members.toLocaleString()}</div>
            <div class="diff">前月比 ${diffLabel(diffUnique)}</div>
          </div>
          <div class="s-card">
            <div class="label">1回のみ</div>
            <div class="value">${latest.once.toLocaleString()}</div>
            <div class="diff">${latest.unique_members ? Math.round(latest.once / latest.unique_members * 100) : 0}%</div>
          </div>
          <div class="s-card">
            <div class="label">2回以上（リピート）</div>
            <div class="value">${latest.repeat.toLocaleString()}</div>
            <div class="diff">前月比 ${diffLabel(diffRepeat)}</div>
          </div>
        </div>`;

      // 月別推移テーブル（全月）
      html += `
        <table class="summary-table">
          <tr>
            <th>月</th>
            <th>総件数</th>
            <th>前月比</th>
            <th>ユニーク会員</th>
            <th>1回のみ</th>
            <th>2回以上</th>
            <th>リピート率</th>
          </tr>`;

      // 新しい月が上に来るよう逆順
      for (let i = data.length - 1; i >= 0; i--) {
        const row  = data[i];
        const pRow = i > 0 ? data[i - 1] : null;
        const diff = pRow ? row.total - pRow.total : null;
        const repeatRate = row.unique_members
          ? Math.round(row.repeat / row.unique_members * 100) : 0;

        let diffCell = '<span class="same">-</span>';
        if (diff !== null) {
          if (diff > 0) diffCell = `<span class="up">▲ ${diff}</span>`;
          else if (diff < 0) diffCell = `<span class="down">▼ ${Math.abs(diff)}</span>`;
          else diffCell = '<span class="same">± 0</span>';
        }

        html += `<tr>
          <td>${row.month}</td>
          <td>${row.total.toLocaleString()}</td>
          <td>${diffCell}</td>
          <td>${row.unique_members.toLocaleString()}</td>
          <td>${row.once.toLocaleString()}</td>
          <td>${row.repeat.toLocaleString()}</td>
          <td>${repeatRate}%</td>
        </tr>`;
      }
      html += '</table>';
      el.innerHTML = html;
    }

    // ===== 2回以上ノーショウ =====
    async function loadRepeat() {
      const [{ months, members }, billingList] = await Promise.all([
        fetchJSON('/api/repeat'),
        fetchJSON('/api/billing')
      ]);

      // チェック状態をマップに変換 { "memberId_month": true/false }
      const billingMap = {};
      for (const b of billingList) {
        billingMap[`${b.member_id}_${b.month}`] = b.checked === 1;
      }

      const el = document.getElementById('repeat-result');
      if (!members.length) {
        el.innerHTML = '<p style="color:#888;margin-top:16px">該当する顧客はいません</p>';
        return;
      }

      let html = `<p style="color:#888;font-size:13px;margin-top:12px">${members.length}名</p>
        <div class="repeat-wrap"><table class="repeat-table"><thead><tr>
          <th>会員CD</th><th>累計</th>`;
      for (const m of months) {
        html += `<th>${m}<br><span style="font-size:11px;font-weight:normal">件数 / 請求</span></th>`;
      }
      html += `</tr></thead><tbody>`;

      for (const member of members) {
        html += `<tr><td>${member.member_id}</td><td>${member.total}</td>`;
        for (const m of months) {
          const cnt = member.months[m] || 0;
          if (cnt >= 2) {
            const key     = `${member.member_id}_${m}`;
            const checked = billingMap[key] ? 'checked' : '';
            html += `<td class="cnt-cell">
              ${cnt}回
              <input type="checkbox" class="bill-check"
                data-member="${member.member_id}" data-month="${m}"
                ${checked}>
            </td>`;
          } else {
            html += `<td>${cnt > 0 ? cnt + '回' : '-'}</td>`;
          }
        }
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;
      el.innerHTML = html;
    }

    // ===== 請求チェックを保存 =====
    async function saveBilling() {
      // 画面上の全チェックボックスを収集
      const checkboxes = document.querySelectorAll('.bill-check');
      const items = Array.from(checkboxes).map(cb => ({
        memberId: cb.dataset.member,
        month:    cb.dataset.month,
        checked:  cb.checked
      }));
      try {
        const res  = await fetch('/api/billing', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items })
        });
        const data = await res.json();
        alert(data.message || data.error);
      } catch {
        alert('保存に失敗しました');
      }
    }

    // ===== 月一覧をプルダウンに読み込む =====
    async function loadMonths() {
      const months = await fetchJSON('/api/months');
      const sel = document.getElementById('monthSelect');
      // 現在の選択値を保持
      const current = sel.value;
      sel.innerHTML = '<option value="">-- 月を選択 --</option>';
      for (const m of months) {
        const opt = document.createElement('option');
        opt.value = m.month;
        opt.textContent = m.month;
        if (m.month === current) opt.selected = true;
        sel.appendChild(opt);
      }
    }

    // ===== 月別集計を表示 =====
    async function loadMonthly() {
      const month = document.getElementById('monthSelect').value;
      if (!month) {
        document.getElementById('monthly-result').innerHTML =
          '<p style="color:#888">月を選択してください</p>';
        return;
      }
      const data = await fetchJSON(`/api/monthly?month=${month}`);
      document.getElementById('monthly-result').innerHTML =
        buildCountTable(data, 'この月のノーショウデータはありません');
    }

    // ===== 全件集計 =====
    async function loadAll() {
      const data = await fetchJSON('/api/counts');
      document.getElementById('all-result').innerHTML =
        buildCountTable(data, 'データがありません');
    }

    // ===== 会員ID検索 =====
    async function searchMember() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      const data = await fetchJSON(`/api/search?q=${encodeURIComponent(q)}`);
      document.getElementById('search-result').innerHTML =
        buildDetailTable(data, '該当する会員IDが見つかりません');
    }

    // ===== fetch共通ヘルパー =====
    async function fetchJSON(url) {
      const res = await fetch(url);
      return res.json();
    }

    // ===== 注意喚起タブ初期化 =====
    function initDaily() {
      const picker = document.getElementById('dailyDate');
      if (!picker.value) {
        picker.value = new Date().toISOString().slice(0, 10);
      }
      loadUncheckedDates();
      loadWeeklyAlerts();
      loadDaily();
    }

    // ===== 未配信日付一覧をTOPに表示 =====
    async function loadUncheckedDates() {
      const data = await fetchJSON('/api/unchecked_dates');
      const box  = document.getElementById('unchecked-dates-box');
      const list = document.getElementById('unchecked-dates-list');

      if (!data.length) {
        box.style.borderColor = '#27ae60';
        box.style.background  = '#eafaf1';
        box.querySelector('div').style.color = '#27ae60';
        box.querySelector('div').textContent = '✅ 未配信の日付はありません';
        list.innerHTML = '';
        return;
      }

      list.innerHTML = data.map(d =>
        `<span onclick="jumpToDate('${d.date}')"
          style="display:inline-block;background:#c0392b;color:white;border-radius:4px;
                 padding:4px 12px;margin:3px;font-size:13px;cursor:pointer;
                 text-decoration:underline" title="クリックで表示">
          ${d.date}（${d.count}名）
        </span>`
      ).join('');
    }

    // ===== 未配信日付をクリックしたときに日付ピッカーを更新して表示 =====
    function jumpToDate(date) {
      document.getElementById('dailyDate').value = date;
      loadDaily();
      // ページをスクロールして日付選択欄へ
      document.getElementById('dailyDate').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // ===== 週間要注意者を取得・表示 =====
    async function loadWeeklyAlerts() {
      const data = await fetchJSON('/api/weekly_alerts');
      const box  = document.getElementById('weekly-alert-box');
      const list = document.getElementById('weekly-alert-list');

      if (!data.alerts || data.alerts.length === 0) {
        box.style.display = 'none';
        window._weeklyAlertSet = new Set();
        return;
      }

      box.style.display = 'block';
      // 週間要注意者のIDをSetで保持（日次テーブルで参照）
      window._weeklyAlertSet = new Set(data.alerts.map(a => a.member_id));

      list.innerHTML = `期間: ${data.start} 〜 ${data.end}　|　該当者: ${data.alerts.length}名<br><br>`
        + data.alerts.map(a =>
            `<span style="display:inline-block;background:#e67e22;color:white;border-radius:4px;padding:2px 8px;margin:2px;font-size:12px">
              ${a.member_id}（${a.count}回）
            </span>`
          ).join('');
    }

    // ===== 日次一覧を表示 =====
    async function loadDaily() {
      const date = document.getElementById('dailyDate').value;
      if (!date) return;

      const data      = await fetchJSON(`/api/daily_list?date=${date}`);
      const el        = document.getElementById('daily-result');
      const statusBar = document.getElementById('daily-status-bar');
      const weeklySet = window._weeklyAlertSet || new Set();

      if (!data.members.length) {
        statusBar.style.display = 'none';
        el.innerHTML = `<p style="color:#888;margin-top:16px">${date} のノーショウデータはありません</p>`;
        return;
      }

      // ステータスバーを更新
      updateStatusBar(date, data.checked, data.members.length);

      // 会員一覧テーブル（チェックボックスなし・読み取り専用）
      let html = `<table class="daily-table">
        <thead><tr>
          <th>#</th>
          <th>会員ID</th>
          <th>週間要注意</th>
        </tr></thead><tbody>`;

      data.members.forEach((memberId, i) => {
        const isWarn   = weeklySet.has(memberId);
        const rowStyle = data.checked ? 'style="color:#aaa"' : '';
        html += `<tr ${rowStyle}>
          <td style="color:#aaa;font-size:12px">${i + 1}</td>
          <td>${memberId}${isWarn ? ' <span class="warn-icon">🚨</span>' : ''}</td>
          <td>${isWarn ? '<span style="color:#e67e22;font-size:13px">🚨 要注意</span>' : '-'}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
      el.innerHTML = html;
    }

    // ===== ステータスバーを更新 =====
    function updateStatusBar(date, checked, count) {
      const bar   = document.getElementById('daily-status-bar');
      const label = document.getElementById('daily-status-label');
      const btn   = document.getElementById('daily-check-btn');

      bar.style.display = 'flex';

      if (checked) {
        bar.style.background   = '#eafaf1';
        bar.style.border       = '1px solid #27ae60';
        label.innerHTML = `✅ ${date} の配信済み（${count}名）`;
        label.style.color = '#27ae60';
        btn.textContent   = '未配信に戻す';
        btn.style.background = '#95a5a6';
      } else {
        bar.style.background   = '#fdf2f2';
        bar.style.border       = '1px solid #c0392b';
        label.innerHTML = `📢 ${date} 未配信（${count}名）`;
        label.style.color = '#c0392b';
        btn.textContent   = '全員を配信済みにする ✅';
        btn.style.background = '#27ae60';
      }
      // 現在の状態を保持
      btn.dataset.date    = date;
      btn.dataset.checked = checked ? '1' : '0';
      btn.dataset.count   = count;
    }

    // ===== 配信済み / 未配信 トグル =====
    async function toggleDailyCheck() {
      const btn     = document.getElementById('daily-check-btn');
      const date    = btn.dataset.date;
      const current = btn.dataset.checked === '1'; // 文字列'1'と比較
      const newVal  = !current;

      const res = await fetch('/api/daily_check', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ date, checked: newVal })
      });
      const result = await res.json();
      if (!res.ok) { alert(result.error); return; }

      // UIを再描画
      updateStatusBar(date, newVal, Number(btn.dataset.count));
      // テーブル行の色も更新
      document.querySelectorAll('.daily-table tbody tr').forEach(tr => {
        tr.style.color = newVal ? '#aaa' : '';
      });
      // 未配信パネルを再読み込み
      loadUncheckedDates();
    }
  </script>

</body>
</html>
